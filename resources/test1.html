<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>响应式导航栏</title>
	<link rel="stylesheet" href="css/all.css">
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 0;
		}

		.navbar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			background-color: #333;
			padding: 10px 20px;
		}

		.navbar a {
			color: white;
			text-decoration: none;
			padding: 14px 20px;
		}

		.navbar a:hover {
			background-color: #575757;
		}

		.menu {
			display: flex;
		}

		.hamburger {
			display: none;
			flex-direction: column;
			cursor: pointer;
		}

		.hamburger div {
			width: 25px;
			height: 3px;
			background-color: white;
			margin: 4px 0;
		}

		@media (max-width: 768px) {
			.menu {
				display: none;
				flex-direction: column;
				width: 100%;
				background-color: #333;
			}

			.hamburger {
				display: flex;
			}

			.navbar.active .menu {
				display: flex;
			}
		}
	</style>
</head>
<body>
	<div class="navbar">
		<div class="brand">网站名称</div>
		<div class="hamburger">
			<div></div>
			<div></div>
			<div></div>
		</div>
		<div class="menu">
			<a href="#">首页</a>
			<a href="#">课程</a>
			<a href="#">资源</a>
			<a href="#">联系</a>
		</div>
	</div>
</body>
</html>
